<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EUPHORIC EVENTS - Event Planning in Karachi</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
.hero-bg {
background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)),
url('https://images.unsplash.com/photo-1511795409834-ef04bbd61622?auto=format&fit=crop&w=1600&q=80') no-repeat center/cover;
}
.service-card:hover {
transform: translateY(-5px);
}
</style>
</head>

<body class="bg-gray-100">

<!-- HERO -->
<section class="hero-bg min-h-screen flex items-center justify-center text-center text-white">
<div>
<h1 class="text-5xl font-bold mb-4">EUPHORIC EVENTS</h1>
<p class="mb-6">Creating Unforgettable Moments</p>
</div>
</section>

<!-- SERVICES -->
<section class="py-16">
<div class="grid md:grid-cols-3 gap-6 px-6">

<div class="service-card bg-white p-4 rounded shadow">
<h2 class="text-xl font-bold">Walima</h2>
<p>Starting from Rs.150,000</p>
<button onclick="openBooking('Walima')" class="mt-4 bg-black text-white px-4 py-2 rounded">Book Now</button>
</div>

<div class="service-card bg-white p-4 rounded shadow">
<h2 class="text-xl font-bold">Mehendi</h2>
<p>Starting from Rs.80,000</p>
<button onclick="openBooking('Mehendi')" class="mt-4 bg-black text-white px-4 py-2 rounded">Book Now</button>
</div>

<div class="service-card bg-white p-4 rounded shadow">
<h2 class="text-xl font-bold">Birthdays</h2>
<p>Starting from Rs.35,000</p>
<button onclick="openBooking('Birthdays')" class="mt-4 bg-black text-white px-4 py-2 rounded">Book Now</button>
</div>

</div>
</section>

<!-- POPUP -->
<div id="bookingModal" class="fixed inset-0 bg-black bg-opacity-70 hidden items-center justify-center">
<div class="bg-white p-6 rounded w-96 relative">

<h2 class="text-xl font-bold mb-4">Book Event</h2>

<input id="name" placeholder="Name" class="w-full border p-2 mb-2">
<input id="phone" placeholder="Phone" class="w-full border p-2 mb-2">
<input id="address" placeholder="Address" class="w-full border p-2 mb-4">

<div id="servicesList"></div>

<button onclick="addMore()" class="bg-gray-200 px-3 py-1 mb-3">+ Add More</button>

<button onclick="submitOrder()" class="w-full bg-black text-white py-2 rounded">Submit</button>

<button onclick="closeModal()" class="absolute top-2 right-3 text-xl">×</button>

</div>
</div>

<script>
let services = [];

function openBooking(service){
services = [service];
renderServices();
document.getElementById("bookingModal").classList.remove("hidden");
document.getElementById("bookingModal").classList.add("flex");
}

function closeModal(){
document.getElementById("bookingModal").classList.add("hidden");
}

function renderServices(){
let container = document.getElementById("servicesList");
container.innerHTML = "";

services.forEach((s,i)=>{
container.innerHTML += `
<div class="flex justify-between items-center mb-2">
<span>${s}</span>
<button onclick="removeService(${i})" class="text-red-500">Remove</button>
</div>
`;
});
}

function addMore(){
let newService = prompt("Enter service name:");
if(newService){
services.push(newService);
renderServices();
}
}

function removeService(index){
services.splice(index,1);
renderServices();
}

function submitOrder(){
let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
let address = document.getElementById("address").value;

if(!name || !phone || !address){
alert("Please fill all fields");
return;
}

let message = `New Order:%0AName: ${name}%0APhone: ${phone}%0AAddress: ${address}%0AServices: ${services.join(", ")}`;

window.open(`https://wa.me/923350356992?text=${message}`);

closeModal();
}
</script>

</body>
</html>
